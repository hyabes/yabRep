services:
  postgres:
    image: postgres:15
    container_name: yab3_postgres_1
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: yabdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - yab3_network
    restart: unless-stopped

  flask:
    build: .
    container_name: yab3_flask_1
    depends_on:
      - postgres
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
    volumes:
      - ./code/backend:/app
    networks:
      - yab3_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: yab3_nginx_1
    ports:
      - "80:80"
    depends_on:
      - flask
    volumes:
      - ./code/frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - yab3_network
    restart: unless-stopped

volumes:
  pgdata:

networks:
  yab3_network:
    driver: bridge
